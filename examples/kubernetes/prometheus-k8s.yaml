# Option: Kubernetes namespace + Prometheus Deployment
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets: ["localhost:9090"]
    - job_name: node-exporter
      static_configs:
      - targets: ["node-exporter:9100"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.52.0
        ports: [{ containerPort: 9090 }]
        resources:
          limits: { cpu: 500m, memory: 512Mi }
          requests: { cpu: 200m, memory: 256Mi }
        volumeMounts:
        - { name: config, mountPath: /etc/prometheus }
        - { name: storage, mountPath: /prometheus }
      volumes:
      - { name: config, configMap: { name: prometheus-config } }
      - { name: storage, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090, nodePort: 30090 }]